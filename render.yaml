services:
  - type: web
    name: digital-canvas-studio-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false   # set to your Vercel URL after first deploy
